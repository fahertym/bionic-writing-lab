<!DOCTYPE html>
<html lang="{{ site.language }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ site.site_title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ site.description }}{% endblock %}" />
    <link rel="stylesheet" href="{{ asset_href }}" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <p class="eyebrow">Markdown-first publishing layer</p>
        <h1 class="site-name"><a href="{{ nav_items[0].href }}">{{ site.site_title }}</a></h1>
        <p class="site-tagline">{{ site.tagline }}</p>
        <nav class="site-nav" aria-label="Primary">
          {% for item in nav_items %}
          <a href="{{ item.href }}">{{ item.label }}</a>
          {% endfor %}
        </nav>
      </header>

      <main class="page-content">
        {% block content %}{% endblock %}
      </main>

      <footer class="site-footer">
        <p>{{ site.copyright }}. Markdown is the source of truth, and the published site is generated from manifests and plain-text writing.</p>
      </footer>
    </div>
  </body>
</html>
